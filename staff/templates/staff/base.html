<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>АСИП - Информирование персонала</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d0d0d;
            --bg-card: #1a1a1a;
            --bg-card-header: #111111;
            --bg-row-alt: #222222;
            --bg-input: #1a1a1a;
            --text-primary: #e0e0e0;
            --text-muted: #888888;
            --border-color: #333333;
            --accent: #4a9eff;
            --glow-white: rgba(255,255,255,0.5);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        h2, h3, h4, h5, h6, p, span, li, td, th, label, strong {
            color: var(--text-primary);
        }

        a {
            color: var(--accent);
        }
        a:hover {
            color: #7ab8ff;
        }

        .navbar-brand {
            font-weight: bold;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
        }
        .card-header {
            background-color: var(--bg-card-header);
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
            color: var(--text-primary);
        }
        .card-body {
            background-color: var(--bg-card);
            color: var(--text-primary);
        }

        .table {
            color: var(--text-primary);
            border-color: var(--border-color);
        }
        .table > :not(caption) > * > * {
            color: var(--text-primary);
            border-color: var(--border-color);
            background-color: transparent;
        }
        .table thead th {
            background-color: var(--bg-card-header);
            border-color: var(--border-color);
            color: var(--text-primary);
        }
        .table-striped > tbody > tr:nth-of-type(odd) > * {
            background-color: var(--bg-row-alt);
            color: var(--text-primary);
        }
        .table-hover > tbody > tr:hover > * {
            background-color: #2a2a2a;
            color: #ffffff;
        }
        .table-bordered {
            border-color: var(--border-color);
        }
        .table-bordered > :not(caption) > * {
            border-color: var(--border-color);
        }
        .table-warning > td,
        .table-warning > th {
            background-color: #3d2e00 !important;
            color: #ffc107 !important;
        }
        .table-success > td,
        .table-success > th {
            background-color: #0d3d0d !important;
            color: #4caf50 !important;
        }
        .table-default > td,
        .table-default > th {
            background-color: transparent;
        }

        .list-group-item {
            background-color: var(--bg-card);
            border-color: var(--border-color);
            color: var(--text-primary);
        }

        .form-control {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .form-control:focus {
            background-color: var(--bg-input);
            border-color: #555;
            color: #ffffff;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }
        .form-label {
            color: var(--text-primary);
        }

        .btn {
            transition: all 0.3s ease;
            border: 1px solid var(--border-color);
        }
        .btn:hover {
            box-shadow: 0 0 12px rgba(255,255,255,0.5), 0 0 25px rgba(255,255,255,0.2);
            transform: translateY(-1px);
        }

        .btn-primary {
            background-color: #1a4a8a;
            border-color: #1a4a8a;
            color: #ffffff;
        }
        .btn-primary:hover {
            background-color: #2563b0;
        }

        .btn-secondary {
            background-color: #2a2a2a;
            border-color: #444;
            color: var(--text-primary);
        }
        .btn-secondary:hover {
            background-color: #3a3a3a;
        }

        .btn-success {
            background-color: #1a5a1a;
            border-color: #1a5a1a;
            color: #ffffff;
        }
        .btn-success:hover {
            background-color: #2a7a2a;
        }

        .btn-info {
            background-color: #1a4a6a;
            border-color: #1a4a6a;
            color: #ffffff;
        }
        .btn-info:hover {
            background-color: #2a6a9a;
        }

        .btn-dark {
            background-color: #222;
            border-color: #444;
            color: var(--text-primary);
        }
        .btn-dark:hover {
            background-color: #333;
        }

        .btn-outline-info {
            color: #7ab8ff;
            border-color: #4a9eff;
        }
        .btn-outline-info:hover {
            background-color: #1a4a6a;
            color: #ffffff;
        }

        .btn-outline-light {
            color: #ccc;
            border-color: #666;
        }
        .btn-outline-light:hover {
            background-color: #333;
            color: #fff;
        }

        .btn-sm:hover {
            box-shadow: 0 0 8px rgba(255,255,255,0.4), 0 0 18px rgba(255,255,255,0.15);
        }

        .btn-close {
            filter: invert(1) grayscale(100%) brightness(200%);
        }

        .badge.bg-danger {
            background-color: #cc2233 !important;
        }
        .badge.bg-success {
            background-color: #2a7a2a !important;
        }
        .badge.bg-warning {
            background-color: #8a6d00 !important;
            color: #ffc107 !important;
        }
        .badge.bg-secondary {
            background-color: #444 !important;
        }

        .progress {
            background-color: #222;
            border-radius: 4px;
        }
        .progress-bar {
            background-color: var(--accent);
        }

        .alert {
            border: 1px solid var(--border-color);
        }
        .alert-success {
            background-color: #0d3d0d;
            border-color: #2a7a2a;
            color: #4caf50;
        }
        .alert-danger {
            background-color: #3d0d0d;
            border-color: #8a1a1a;
            color: #f44336;
        }
        .alert-warning {
            background-color: #3d2e00;
            border-color: #8a6d00;
            color: #ffc107;
        }
        .alert-info {
            background-color: #0d2e3d;
            border-color: #1a5a8a;
            color: #4a9eff;
        }
        .alert-secondary {
            background-color: #222;
            border-color: #444;
            color: var(--text-primary);
        }

        .nav-tabs {
            border-bottom-color: var(--border-color);
        }
        .nav-tabs .nav-link {
            color: var(--text-muted);
            border-color: transparent;
        }
        .nav-tabs .nav-link.active {
            background-color: var(--bg-card);
            border-color: var(--border-color) var(--border-color) var(--bg-card);
            color: var(--text-primary);
        }
        .nav-tabs .nav-link:hover {
            border-color: transparent;
            color: #ffffff;
        }

        .text-muted {
            color: var(--text-muted) !important;
        }
        .text-success {
            color: #4caf50 !important;
        }

        pre {
            background-color: #111;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
        }

        .urgent-badge {
            background-color: #cc2233;
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.8em;
        }

        hr {
            border-color: var(--border-color);
        }

        select {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #666;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'staff:dashboard' %}">АСИП</a>
            <div class="ms-auto">
                {% if user.is_authenticated %}
                <span class="navbar-text text-white me-3">{{ user.get_full_name|default:user.username }}</span>
                <a href="{% url 'staff:my_notifications' %}" class="btn btn-outline-info btn-sm me-2">📋 Мои
                    уведомления</a>
                <a href="{% url 'staff:logout' %}" class="btn btn-outline-light btn-sm">Выйти</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% if messages %}
        {% for msg in messages %}
        <div class="alert alert-{{ msg.tags }} alert-dismissible fade show" role="alert">
            {{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
