<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>АСИП - Информирование персонала</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0e0e0e;
            --bg-card: #141414;
            --bg-card-header: #111111;
            --bg-row-alt: #1a1a1a;
            --bg-input: #141414;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-muted: #666666;
            --border-color: #1f1f1f;
            --border-light: #2a2a2a;
            --accent: #ffffff;
            --glow-white: rgba(255,255,255,0.5);
        }

        * {
            font-family: 'JetBrains Mono', monospace;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
        }

        h2, h3, h4, h5, h6 {
            color: var(--text-primary);
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p, span, li, td, th, label, strong {
            color: var(--text-secondary);
        }

        a {
            color: var(--text-primary);
            text-decoration: none;
        }
        a:hover {
            color: #ffffff;
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }
        .card-header {
            background-color: var(--bg-card-header);
            border-bottom: 1px solid var(--border-color);
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }
        .card-body {
            background-color: var(--bg-card);
            color: var(--text-secondary);
        }

        .table {
            color: var(--text-secondary);
            border-color: var(--border-color);
            font-size: 13px;
        }
        .table > :not(caption) > * > * {
            color: var(--text-secondary);
            border-color: var(--border-color);
            background-color: transparent;
        }
        .table thead th {
            background-color: var(--bg-card-header);
            border-color: var(--border-color);
            color: var(--text-primary);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .table-striped > tbody > tr:nth-of-type(odd) > * {
            background-color: var(--bg-row-alt);
            color: var(--text-secondary);
        }
        .table-hover > tbody > tr:hover > * {
            background-color: #1f1f1f;
            color: var(--text-primary);
        }
        .table-bordered {
            border-color: var(--border-color);
        }
        .table-bordered > :not(caption) > * {
            border-color: var(--border-color);
        }
        .table-warning > td,
        .table-warning > th {
            background-color: #1a1a10 !important;
            color: #e0e0a0 !important;
        }
        .table-success > td,
        .table-success > th {
            background-color: #101a10 !important;
            color: #a0e0a0 !important;
        }
        .table-default > td,
        .table-default > th {
            background-color: transparent;
        }

        .list-group-item {
            background-color: var(--bg-card);
            border-color: var(--border-color);
            color: var(--text-secondary);
        }

        .form-control {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }
        .form-control:focus {
            background-color: var(--bg-input);
            border-color: #444;
            color: #ffffff;
            box-shadow: 0 0 12px rgba(255,255,255,0.15);
        }
        .form-label {
            color: var(--text-primary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-select {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
        }
        .form-select:focus {
            box-shadow: 0 0 12px rgba(255,255,255,0.15);
            border-color: #444;
        }

        .btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.25s ease;
            border: 1px solid var(--border-light);
            border-radius: 4px;
            letter-spacing: 0.3px;
        }
        .btn:hover {
            box-shadow: 0 0 12px rgba(255,255,255,0.5), 0 0 28px rgba(255,255,255,0.15);
            transform: translateY(-1px);
        }

        .btn-primary {
            background-color: #ffffff;
            border-color: #ffffff;
            color: #000000;
        }
        .btn-primary:hover {
            background-color: #ffffff;
            color: #000000;
        }

        .btn-secondary {
            background-color: #1a1a1a;
            border-color: #2a2a2a;
            color: var(--text-secondary);
        }
        .btn-secondary:hover {
            background-color: #222222;
            color: var(--text-primary);
        }

        .btn-success {
            background-color: #1a1a1a;
            border-color: #2a2a2a;
            color: var(--text-primary);
        }
        .btn-success:hover {
            background-color: #222222;
        }

        .btn-info {
            background-color: #1a1a1a;
            border-color: #2a2a2a;
            color: var(--text-primary);
        }
        .btn-info:hover {
            background-color: #222222;
        }

        .btn-dark {
            background-color: #1a1a1a;
            border-color: #2a2a2a;
            color: var(--text-primary);
        }
        .btn-dark:hover {
            background-color: #222222;
        }

        .btn-outline-info {
            color: var(--text-primary);
            border-color: #2a2a2a;
        }
        .btn-outline-info:hover {
            background-color: #1a1a1a;
            color: var(--text-primary);
        }

        .btn-outline-light {
            color: var(--text-secondary);
            border-color: #2a2a2a;
        }
        .btn-outline-light:hover {
            background-color: #1a1a1a;
            color: var(--text-primary);
        }

        .btn-sm:hover {
            box-shadow: 0 0 10px rgba(255,255,255,0.4), 0 0 22px rgba(255,255,255,0.1);
        }

        .btn-close {
            filter: invert(1) grayscale(100%) brightness(200%);
        }

        .badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .badge.bg-danger {
            background-color: #2a1a1a !important;
            color: #ff6b6b !important;
        }
        .badge.bg-success {
            background-color: #1a2a1a !important;
            color: #6bff6b !important;
        }
        .badge.bg-warning {
            background-color: #2a2a1a !important;
            color: #e0e0a0 !important;
        }
        .badge.bg-secondary {
            background-color: #1a1a1a !important;
            color: var(--text-muted) !important;
        }

        .progress {
            background-color: #1a1a1a;
            border-radius: 2px;
            height: 6px;
        }
        .progress-bar {
            background-color: #ffffff;
        }

        .alert {
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 13px;
        }
        .alert-success {
            background-color: #101a10;
            border-color: #1a2a1a;
            color: #6bff6b;
        }
        .alert-danger {
            background-color: #1a1010;
            border-color: #2a1a1a;
            color: #ff6b6b;
        }
        .alert-warning {
            background-color: #1a1a10;
            border-color: #2a2a1a;
            color: #e0e0a0;
        }
        .alert-info {
            background-color: #101018;
            border-color: #1a1a2a;
            color: #b0b0e0;
        }
        .alert-secondary {
            background-color: #141414;
            border-color: #2a2a2a;
            color: var(--text-secondary);
        }

        .nav-tabs {
            border-bottom-color: var(--border-color);
        }
        .nav-tabs .nav-link {
            color: var(--text-muted);
            border-color: transparent;
            font-size: 13px;
            font-weight: 600;
        }
        .nav-tabs .nav-link.active {
            background-color: var(--bg-card);
            border-color: var(--border-color) var(--border-color) var(--bg-card);
            color: var(--text-primary);
        }
        .nav-tabs .nav-link:hover {
            border-color: transparent;
            color: var(--text-primary);
        }

        .text-muted {
            color: var(--text-muted) !important;
        }
        .text-success {
            color: #6bff6b !important;
        }
        .text-white {
            color: #ffffff !important;
        }

        pre {
            background-color: #111;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
            font-size: 12px;
        }

        .urgent-badge {
            background-color: #2a1a1a;
            color: #ff6b6b;
            border: 1px solid #3a2a2a;
            border-radius: 3px;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 600;
        }

        hr {
            border-color: var(--border-color);
        }

        select {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .navbar-dark {
            background-color: var(--bg-primary) !important;
            border-bottom: 1px solid var(--border-color);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        .container {
            max-width: 1100px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'staff:dashboard' %}">АСИП</a>
            <div class="ms-auto">
                {% if user.is_authenticated %}
                <span class="navbar-text text-white me-3">{{ user.get_full_name|default:user.username }}</span>
                <a href="{% url 'staff:my_notifications' %}" class="btn btn-outline-info btn-sm me-2">📋 Мои
                    уведомления</a>
                <a href="{% url 'staff:logout' %}" class="btn btn-outline-light btn-sm">Выйти</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% if messages %}
        {% for msg in messages %}
        <div class="alert alert-{{ msg.tags }} alert-dismissible fade show" role="alert">
            {{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
