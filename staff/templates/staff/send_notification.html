{% extends 'staff/base.html' %}
{% block content %}
<h3>✉️ Создать новое уведомление</h3>
<div class="card mt-3">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                {{ field.label_tag }}
                {{ field }}
                {% if field.help_text %}<small class="form-text text-muted">{{ field.help_text }}</small>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary">Отправить</button>
            <a href="{% url 'staff:dashboard' %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
